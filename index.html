<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>성경 인물 MBTI 테스트</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 40%, #1a3a5c 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.97);
    border-radius: 24px;
    max-width: 600px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }

  /* INTRO */
  #intro { padding: 48px 36px; text-align: center; }
  .intro-emoji { font-size: 64px; margin-bottom: 16px; }
  .intro-title { font-size: 26px; font-weight: 900; color: #1a0533; line-height: 1.3; margin-bottom: 8px; }
  .intro-sub { font-size: 14px; color: #7c6a9e; margin-bottom: 32px; line-height: 1.6; }
  .btn-start {
    background: linear-gradient(135deg, #6b21a8, #3b82f6);
    color: #fff; border: none; padding: 16px 48px;
    border-radius: 50px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 24px rgba(107,33,168,0.35);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(107,33,168,0.45); }

  /* QUIZ */
  #quiz { display: none; }
  .progress-bar-wrap { background: #f3eeff; height: 6px; }
  .progress-bar { height: 6px; background: linear-gradient(90deg, #6b21a8, #3b82f6); transition: width 0.4s ease; }
  .quiz-header { padding: 20px 28px 0; display: flex; justify-content: space-between; align-items: center; }
  .q-counter { font-size: 13px; color: #9c7fc4; font-weight: 700; }
  .question-area { padding: 24px 28px 28px; }
  .question-text { font-size: 18px; font-weight: 700; color: #1a0533; line-height: 1.55; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt-btn {
    background: #fff; border: 2px solid #e8dff8; border-radius: 14px;
    padding: 16px 20px; text-align: left; font-size: 15px; color: #2d1b69;
    cursor: pointer; font-family: inherit; transition: all 0.18s;
    font-weight: 500; line-height: 1.5;
  }
  .opt-btn:hover { border-color: #6b21a8; background: #f8f3ff; transform: translateX(4px); }

  /* RESULT */
  #result { display: none; }

  .result-top {
    background: linear-gradient(135deg, #1a0533, #2d1b69, #1a3a5c);
    padding: 0;
    position: relative;
    text-align: center;
  }

  .char-placeholder {
    width: 100%;
    max-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: #1557c0;
    padding: 10px;
  }
  .char-placeholder img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  .result-name-area {
    padding: 20px 28px 28px;
    text-align: left;
  }
  .result-intro-small {
    font-size: 15px;
    color: #c4b5fd;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .result-name-big {
    font-size: 30px;
    font-weight: 900;
    color: #fff;

    margin-bottom: 12px;
  }
  .result-name-big span {
    color: #a5b4fc;
  }
  .result-read {

    color: #a5b4fc;
    line-height: 1.6;
    border-left: 3px solid #6366f1;
    padding-left: 12px;
    margin-top: 4px;
  }

  .result-sections {
    padding: 0 28px 28px;
    background: linear-gradient(180deg, #1a3a5c 0%, #1a0533 100%);
  }

  .result-section {
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .result-section:last-child { border-bottom: none; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #c4b5fd;
    margin-bottom: 10px;
  }

  .section-verse {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.8;
    font-style: italic;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid #6366f1;
  }
  .section-verse .verse-ref {
    display: block;
    font-style: normal;
    font-size: 12px;
    color: #a5b4fc;
    margin-top: 6px;
    text-align: right;
  }

  .section-prayer {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.8;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .section-gift-name {
    font-size: 18px;
    font-weight: 900;
    color: #c4b5fd;
    margin-bottom: 6px;
  }
  .section-gift-desc {
    font-size: 13px;
    color: #cbd5e1;
    line-height: 1.7;
  }

  .btn-retry {
    display: block; width: 100%;
    background: linear-gradient(135deg, #6b21a8, #3b82f6);
    color: #fff; border: none; padding: 15px;
    border-radius: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    margin-top: 20px; transition: opacity 0.2s;
  }
  .btn-retry:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="container">

  <div id="intro">

      </div>
    </div>

      <div class="result-section">

        <div class="section-gift-name" id="rGift"></div>

      </div>

      <button class="btn-retry" onclick="resetQuiz()">🔄 다시 테스트하기</button>

</div>

<script>

  { text: '"아무 생각도 하지 말고 가만히 있어."라는 말을 들었을 때 나는', opts: ["생각을 멈출 수 없다", "말 그대로 아무 생각도 하지 않고 머리를 비운다"], scores: ["N","S"] },

  { text: "단체 활동을 마치고 평가 받을 때 내가 더 듣고 싶은 말은", opts: ['"정말 잘했어. 네 덕분에 결과가 좋아졌어."', '"정말 고생했어. 네 노력이 모두에게 큰 힘이 되었어."'], scores: ["T","F"] },

  { text: "여행 가기 전에 나는", opts: ["미리미리 짐을 싼다", "출발하는 날 아침에 짐을 싼다"], scores: ["J","P"] },
  { text: "규칙이 엄격한 학교에서 나는", opts: ["정해진 규칙을 잘 지킨다", "잘 적응하지 못하는 편이다"], scores: ["J","P"] },
  { text: "숙제가 내일 까지 라고 했을 때 나는", opts: ["더 완벽한 숙제를 위해 시간을 쓰다가 내지 못하는 경우가 있다", "완벽한 숙제도 좋지만 시간에 맞춰 내는 것이 더 중요하다"], scores: ["P","J"] },

  ENFJ: { name: "요나단", tagline: "애정이 가득한 지지자", read: "요나단에 대해서 더 알아보고 싶다면 사무엘상 18장과 20장을 읽어보세요.", verse: "예수께서 나오사 큰 무리를 보시고 그 목자 없는 양 같음으로 인하여 불쌍히 여기사 이에 여러 가지로 가르치시더라.", ref: "마가복음 6:34", prayer: "하나님, 제가 감당할 수 있는 일만 하고 나머지는 주님을 믿고 맡기도록 도와주세요. 어… 그런데 이걸 확실히 적어놔도 괜찮으시죠?", gift: "가르침(Teaching)", giftDesc: "당신은 다른 사람들과 함께 만들어갈 미래를 계획함으로써 그들을 향한 사랑을 표현합니다." },

};

let scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
let current = 0;

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('qCounter').textContent = (current + 1) + " / " + questions.length;
  document.getElementById('progressBar').style.width = ((current / questions.length) * 100 + 5) + "%";
  document.getElementById('questionText').textContent = q.text;
  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(i) {
  scores[questions[current].scores[i]]++;
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const mbti =
    (scores.E >= scores.I ? 'E' : 'I') +
    (scores.S >= scores.N ? 'S' : 'N') +
    (scores.T >= scores.F ? 'T' : 'F') +
    (scores.J >= scores.P ? 'J' : 'P');
  const r = results[mbti];
  if (r) {
    document.getElementById('rNameBig').innerHTML = "<span>" + r.tagline + ",</span><br>" + r.name + " 입니다.";
    document.getElementById('rRead').textContent = r.read;
    document.getElementById('rVerse').textContent = r.verse;
    document.getElementById('rRef').textContent = r.ref;
    document.getElementById('rMbtiLabel').textContent = mbti;
    document.getElementById('rPrayer').textContent = r.prayer;
    document.getElementById('rGift').textContent = r.gift;
    document.getElementById('rGiftDesc').textContent = r.giftDesc;
  }

  const imgEl = document.getElementById('rCharImg');
  const src = charImages[mbti];
  if (src) {
    imgEl.src = src;
    imgEl.style.display = 'block';
  }
}

function resetQuiz() {
  scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  current = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
}
</script>
