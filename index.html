<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 인물 MBTI 테스트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 40%, #1a3a5c 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.97);
    border-radius: 24px;
    max-width: 600px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }

  /* INTRO */
  #intro { padding: 48px 36px; text-align: center; }
  .intro-emoji { font-size: 64px; margin-bottom: 16px; }
  .intro-title { font-size: 26px; font-weight: 900; color: #1a0533; line-height: 1.3; margin-bottom: 8px; }
  .intro-sub { font-size: 14px; color: #7c6a9e; margin-bottom: 32px; line-height: 1.6; }
  .btn-start {
    background: linear-gradient(135deg, #6b21a8, #3b82f6);
    color: #fff; border: none; padding: 16px 48px;
    border-radius: 50px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 24px rgba(107,33,168,0.35);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(107,33,168,0.45); }

  /* QUIZ */
  #quiz { display: none; }
  .progress-bar-wrap { background: #f3eeff; height: 6px; }
  .progress-bar { height: 6px; background: linear-gradient(90deg, #6b21a8, #3b82f6); transition: width 0.4s ease; }
  .quiz-header { padding: 20px 28px 0; display: flex; justify-content: space-between; align-items: center; }
  .q-counter { font-size: 13px; color: #9c7fc4; font-weight: 700; }
  .question-area { padding: 24px 28px 28px; }
  .question-text { font-size: 18px; font-weight: 700; color: #1a0533; line-height: 1.55; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt-btn {
    background: #fff; border: 2px solid #e8dff8; border-radius: 14px;
    padding: 16px 20px; text-align: left; font-size: 15px; color: #2d1b69;
    cursor: pointer; font-family: inherit; transition: all 0.18s;
    font-weight: 500; line-height: 1.5;
  }
  .opt-btn:hover { border-color: #6b21a8; background: #f8f3ff; transform: translateX(4px); }

  /* RESULT */
  #result { display: none; }

  .result-top {
    background: linear-gradient(135deg, #1a0533, #2d1b69, #1a3a5c);
    padding: 0;
    position: relative;
    text-align: center;
  }

  /* 캐릭터 이미지 잘림 방지 스타일 */
  .char-placeholder {
    width: 100%;
    max-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: #1557c0;
    padding: 10px;
  }
  .char-placeholder img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }
  .char-placeholder-text {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .result-name-area {
    padding: 20px 28px 28px;
    text-align: left;
  }
  .result-intro-small {
    font-size: 15px;
    color: #c4b5fd;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .result-name-big {
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .result-name-big span {
    color: #a5b4fc;
  }
  .result-read {
    font-size: 13px;
    color: #a5b4fc;
    line-height: 1.6;
    border-left: 3px solid #6366f1;
    padding-left: 12px;
    margin-top: 4px;
  }

  /* 구분선 */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #6366f1, transparent);
    margin: 0 24px;
  }

  /* 결과 섹션들 */
  .result-sections {
    padding: 0 28px 28px;
    background: linear-gradient(180deg, #1a3a5c 0%, #1a0533 100%);
  }

  .result-section {
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .result-section:last-child { border-bottom: none; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #c4b5fd;
    margin-bottom: 10px;
  }
  .section-label .icon { font-size: 20px; }

  .section-verse {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.8;
    font-style: italic;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid #6366f1;
  }
  .section-verse .verse-ref {
    display: block;
    font-style: normal;
    font-size: 12px;
    color: #a5b4fc;
    margin-top: 6px;
    text-align: right;
  }

  .section-prayer {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.8;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .section-gift-name {
    font-size: 18px;
    font-weight: 900;
    color: #c4b5fd;
    margin-bottom: 6px;
  }
  .section-gift-desc {
    font-size: 13px;
    color: #cbd5e1;
    line-height: 1.7;
  }

  .btn-retry {
    display: block; width: 100%;
    background: linear-gradient(135deg, #6b21a8, #3b82f6);
    color: #fff; border: none; padding: 15px;
    border-radius: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    margin-top: 20px; transition: opacity 0.2s;
  }
  .btn-retry:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="container">

  <div id="intro">
    <div class="intro-emoji">✝️</div>
    <div class="intro-title">나의 성경 속 부캐는<br>누구일까요?</div>
    <div class="intro-sub">20가지 질문으로 나의 성향을 파악하고<br>가장 닮은 성경 인물을 찾아보세요 🙏</div>
    <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
  </div>

  <div id="quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:5%"></div>
    </div>
    <div class="quiz-header">
      <div class="q-counter" id="qCounter">1 / 20</div>
    </div>
    <div class="question-area">
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsArea"></div>
    </div>
  </div>

  <div id="result">
    <div class="result-top">
      <div class="char-placeholder">
        <img id="rCharImg" src="" alt="캐릭터" />
      </div>
      <div class="result-name-area">
        <div class="result-intro-small">당신의 성경 속 부캐는</div>
        <div class="result-name-big" id="rNameBig"></div>
        <div class="result-read" id="rRead"></div>
      </div>
    </div>

    <div class="result-sections">
      <div class="result-section">
        <div class="section-label"><span class="icon">📖</span> 당신이 좋아할만한 성경구절은...</div>
        <div class="section-verse">
          <span id="rVerse"></span>
          <span class="verse-ref" id="rRef"></span>
